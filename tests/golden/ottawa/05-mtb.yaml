          - 43-boreale
          - 44-mo
          - trail-47
          - trail-47-hope-trail
          - trail-50
          - sentier-trail-51
          - trail-52
          - trail-52-parc-de-la-gatineau-pathway
          - 53b-bench
          - trail-53
          - trail-54
          - trail-55
          - trail-56b
          - trail-57
          - 58-konnektor
          - 58-glazer
          - 59-moonshine
          - trail-65
          - trail-66
          - 68-missing-link
          - trail-68
          - trail-71
          - 72b-irish-cream
          - 72b-irish-whiskey
          - trail-72
