# MTB — dirt, purpose-built, technical. Dedicated bike, dedicated day.
#
# The biggest file. 8 networks, each with a tier_1 (famous / named
# trails) and tier_2 (numbered / shorter / less-known) split. Parc de la
# Gatineau alone has ~58 trails that mostly collapse into tier_2.
#
# This is the only file where the "3-5 up to 8" cap really bites.
#
# See README.md for the broader structure.

tabs:
  mtb:
    label_key: paths.cat_mtb

    networks:

      # The MTB side of Gatineau Park — dirt singletrack, technical,
      # dedicated suspension bike territory. The non-MTB cycling (paved
      # Parkway, gravel roads, non-technical trails) lives in the
      # `parc-de-la-gatineau` network in 01-pathways.yaml — same physical
      # park, different cycling experience entirely.
      - slug: parc-de-la-gatineau-mtb
        name: Gatineau Park MTB
        # Display renamed 2026-04-16 from "Parc de la Gatineau (MTB trails)"
        # to avoid visual collision with the pathway sibling network in
        # 01-pathways.yaml (both started with "Parc de la Gatineau...").
        container_type: park
        operator: National Capital Commission
        tier_1_paths:
          - hermit
          - whale
          - salamander
          - the-sweet-line
          - 41-de-la-mine
          - 45-powerline
          - 76-jesses-girl
          - 79-bresilienne
        tier_2_paths:
          # Named trails
          - la-chica
          - bypass                              # TODO(review) — still uncertain
          - carman-lake-lookout-trail           # confirmed MTB per user
          - chemin-cowden                       # confirmed MTB per user (surprising — chemin = road, but user knows)
          - gay-beach-trail                     # confirmed MTB per user
          # trail-to-fire-tower moved to segments below (no HTML page, too short)
          # Numbered trails
          - trail-1b
          - trail-2
          - trail-3
          - trail-7
          - piste-9
          - trail-14
          - trail-22b
          - trail-24-1
          - piste-25
