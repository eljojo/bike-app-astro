          # monkey-trail removed 2026-04-16 — no geometric data, unverified guess. See needs_review in 06-everything-else.yaml.

        # Segments of this network — members that exist (appear on the
        # map, listed in the overflow accordion) but don't warrant their
        # own HTML detail page. Classifier rule: members listed here get
        # `standalone: false`, which the existing rendering at
        # BikePathDetail.astro:331-358 already shows as a muted non-link.
        #
        # Distinct from tier_2_paths (which have HTML pages, just collapsed).
        # Same vocabulary as Phase 1's path-parent segments, different
        # rendering path — path-parent segments render on the parent's
        # detail page with #segment-slug anchors; network-parent segments
        # render in the member list as standalone:false entries.
        segments:
          - trail-to-fire-tower              # too short for a page, per user

