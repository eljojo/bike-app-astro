# ============================================================================
# CITY_BOUNDS_EXPECTATIONS — what the bounds clip does
# ============================================================================

city_bounds_expectations:

  hard_filtered:                           # entirely outside hard bounds
    - fatbike-mont-tremblant
    - cheminduquebec-5-st-jean-farnham

  soft_trimmed:                            # clipped at soft bounds
    - slug: route-verte-1
      expected_length_after_km_range: [50, 400]  # TODO(review) — tighten
    - slug: sentier-trans-canada-gatineau-montreal
      expected_length_after_km_range: [60, 120]  # TODO(review)

  force_included:                          # near-bounds trails that stay
    - slug: algonquin-trail
      reason: reaches into the Ottawa Valley, editorial keep
    - slug: ottawa-valley-recreation-trail
      reason: same

# ============================================================================
# NEEDS_REVIEW — editorial checklist. When empty, the golden file is ratified.
# ============================================================================

needs_review:

  - topic: NCC Greenbelt hiking trails
    question: |
      Which named Greenbelt trails (Beaver, Chipmunk, Dewberry, Jack Pine,
      Lime Kiln, Moe Anderson, Pine Grove, Arboretum Loop) allow cycling?
      Filter non-cycling, reclassify cycling ones into MTB or Pathways.

  - topic: Gatineau Bikeways network
    question: |
      Does this network exist editorially? Or should Boulevard de la Gappe,
      Boulevard de la Cité-des-Jeunes, Chemin de Masson be standalone
      bikeways with no network parent?

  - topic: NCC Greenbelt MTB network
    question: |
      Does an MTB sub-network exist editorially? Or should the numbered
      trails (Trail 1, 8, 10, etc.) be standalone MTB paths? If a network,
      which trails are tier-1 famous?

  - topic: Québec rail trail relationships
    question: |
      Is Le P'tit Train du Nord part of Route Verte 1, a sibling, or its
      own thing? Same for Cycloparc PPJ and Voie Verte Chelsea. Determines
      the `related_networks_mutual` structure.

  - topic: Sentier Trans-Canada Québec decomposition
    question: |
      What regional sub-paths should decomposition produce? Need 5-8
      named sections with real regional identity. My placeholders (Parc
      de la Gatineau / Wakefield / Maniwaki / Mont-Laurier) are guesses.
      What are the split points in km?

  - topic: Route Verte 1 city bounds
    question: |
      How much of RV1 should remain visible under Ottawa city bounds?
      Extends from Outaouais to Gaspé — most is "not Ottawa".

  - topic: Mill of Kintail / Carp Barrens / Nepean Trail
    question: |
      Pathways, MTB, or Trails? Edge cases I'm guessing on.

  - topic: Trans Canada Trail Ottawa area consolidation
    question: |
      Today "Trans Canada Trail (Ottawa area)" is separate from the
      broader TCT. Should it be absorbed into `trans-canada-trail-ontario`
      or kept as a regional sub-network? My reclassifications assume
      absorption.

  - topic: Cross-network primary_memberOf for Ottawa-Carleton Trailway
    question: |
      OCT-east is in NCC Greenbelt. OCT-west is (pending) in TCT Ontario.
      Are these the same trail (should merge) or distinct pathways that
      share a name?

  - topic: Park-naming fallback rule (parc-de-la-gatineau-1 case)
    question: |
      The pipeline currently names paths after the containing park by
      default. When the park is small and the path is unnamed, that's
      usually fine. But when the park is huge and contains many paths
      (Parc de la Gatineau), the result is multiple entries all called
      "Parc de la Gatineau" with numeric suffixes, which is confusing.
      Add a classifier rule: if the containing park has >N member paths
      (threshold TBD), fall back to the road/trail name instead of the
      park name. Pipeline work, not editorial.

  - topic: trail-1-1 geometry lookup + rename
    question: |
      `trail-1-1` is an auto-generated slug from a numbered-trail
      collision. User wants it kept under Trails (local or long-distance
      TBD) but renamed based on geometry lookup. Investigation task:
      look up the OSM geometry, figure out what park/area contains it,
      propose a better slug. Related to the park-naming fallback rule
      above — this is the first candidate for that rule.

  - topic: Ottawa River Pathway markdown split
    question: |
      The markdown file for `ottawa-river-pathway` (bike-routes repo)
      needs to be split into two parts and assigned to each existing
      path entry with the correct slug (east vs west, or however the
      pipeline resolves the split). Data-repo task, not a golden file
      assertion — flag here so it's not forgotten.

  - topic: Pine Grove Forestry Trail merge direction
    question: |
      Editorial call made (2026-04-15): canonical slug is
      `pine-grove-forestry-trail`; `trail-43-pine-grove-forestry-trail`
      is the duplicate to be filtered via slug_deduplications.
      Placement: ncc-greenbelt-mtb tier_2. Confirm this is correct
      before the dedup rule ships.

  - topic: Monkey Trail placement
    question: |
      Claude moved `monkey-trail` from `ncc-greenbelt-mtb` tier_2 to
      `parc-de-la-gatineau-mtb` tier_2 per user instruction. Confirm
      this matches the trail's actual location — I did not verify
      geometry.
