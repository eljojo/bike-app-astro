# ============================================================================
# SLUG_DEDUPLICATIONS — pipeline-produced `-N` suffixed duplicate slugs
# ============================================================================

slug_deduplications:

  - duplicate_slug: beaverpond-park-1
    canonical_slug: beaverpond-park
    resolution: both tiny parks, filter both via filter_out above

  - duplicate_slug: parc-de-la-gatineau-1
    canonical_slug: parc-de-la-gatineau
    resolution: merge into the Parc de la Gatineau network entry

  # trail-1-1 is NOT a duplicate — it's a standalone trail with an
  # auto-generated slug collision. User wants it kept under Trails with
  # a better name; see needs_review for the lookup/rename task.

  - duplicate_slug: trail-43-pine-grove-forestry-trail
    canonical_slug: pine-grove-forestry-trail
    resolution: merge into pine-grove-forestry-trail under ncc-greenbelt-mtb tier_2

