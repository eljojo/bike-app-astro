# ============================================================================
# RECLASSIFY_AS_CONNECTOR — entries that should become type=connector
#                          (app-aware for routing/scoring, no HTML page, not
#                          on map). For OSM relations with route=hiking/foot/
#                          piste and no bicycle-legal ways, or paths with
#                          only foot=yes and no bicycle tag.
# ============================================================================

reclassify_as_connector:

  - slug: dewberry-trail
    reason: OSM highway=path with foot=yes only, no bicycle tag — connector for routing

  - slug: sia-6-route-dacces-amqui
