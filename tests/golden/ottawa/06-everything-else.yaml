# Everything else — cross-cutting diagnostic and cleanup.
#
# filter_out, slug_deduplications, renames, reclassifications,
# cross_memberships, related_networks_mutual, segments_expectations,
# city_bounds_expectations, needs_review.
#
# This is where the data-cleanup decisions live. When this file is
# resolved, the pipeline is classifying Ottawa entries into the golden
# state described in files 01-05.
#
# See README.md for the broader structure.

version: 1
city: ottawa
last_reviewed: 2026-04-15
reviewed_by: [jose]

# The "all"/uncategorized tab cap. If the pipeline produces more than
# this, classifier rules need tweaking.
all_tab_max_entries: 10

