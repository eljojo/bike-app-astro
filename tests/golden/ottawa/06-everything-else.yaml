# ============================================================================
# NEEDS_REVIEW — editorial checklist. When empty, the golden file is ratified.
# ============================================================================

needs_review:

  # ─── Stage 2 pipeline rule reminders (see 2026-04-16-bike-paths-ia-mega.md) ───

  - topic: Stage 2 Rule 1 — road-with-bike-lane detection
    question: |
      Pipeline must stop classifying named roads (highway=primary/secondary/
      tertiary/residential with cycleway:*=lane/track/separated) as
      path_type=mup destinations. They belong in bikeways as
      type=infrastructure, path_type=bike-lane. Affects ~200 current
      entries (Hunt Club Road, Trim Road, Carling Avenue, Riverside Drive,
      and the full BIKELANE_ON_ROAD + ROAD_AS_PATH buckets from the
      2026-04-16 classification analysis).

  - topic: Stage 2 Rule 2 — OSM route tag respect
    question: |
      When an entry's underlying relation has route=hiking/foot/piste and
      no bicycle-legal ways, reclassify as type=connector (app-aware for
      routing, no page, not on map). Do NOT filter-delete. The
      reclassify_as_connector: entries above document expected behavior.

  - topic: Stage 2 Rule 3 — bicycle tag authoritative on highway=path
    question: |
      For highway=path entries: bicycle=yes/designated keep as trail/
      mtb-trail; bicycle=no or foot=yes only → connector; no tags →
      needs_review (don't default silently). Documented by the moves of
      jack-pine-trail et al. to MTB (bicycle=yes) and dewberry-trail to
      reclassify_as_connector (foot=yes only).

  - topic: Stage 2 Rule 4 — park-naming heuristic
    question: |
      Replace the current "name unnamed bike path after containing park"
      rule with "count all bike paths contained in the park's geometry;
      if count > threshold (~3-5), use nearest-road name instead."
      Eliminates parc-de-la-gatineau-1 / -2 / etc. slug collisions at
      source. See the 1000-word explanation delivered in chat 2026-04-16.

  - topic: Stage 2 Rule 5 — honor markdown `includes:` as network declaration
    question: |
      gatineau-cycling-network.md (9 sentier-* members) and
      prescott-russell-trail-link.md both use the markdown includes:
      mechanism. Pipeline currently ignores it, leaving those paths as
      standalone destinations. Rule: when a markdown has includes: [slugs],
      produce a bikepaths.yml network entry with those slugs as members.

  - topic: Stage 2 Rule 6 — suppress empty network wrappers
    question: |
      Pipeline emits bogus "X Trails" network wrappers (la-boucle-trails,
      st-james-woods-trails, the-beast-trail-trails,
      kizell-pond-trail-north-trails,
      mississippi-valley-trail-art-section-trails) alongside same-named
      real path entries. Rule: suppress the wrapper when a same-slug path
      entry exists. After Rule 6 ships, the renames category (dropped
      from this golden 2026-04-16) stays unnecessary.

  - topic: Stage 1.5 Rule 7 — split mixed-character networks
    question: |
      For networks spanning pathway-class path_types AND mtb-trail, auto-
      split into <slug> (pathway members) + <slug>-mtb (MTB members).
      Fixes the NCC Greenbelt and Parc de la Gatineau landing-in-MTB-tab
      problem. Stage 1.5.

  - topic: Stage 1.5 Rule 8 — geographic auto-clustering for bikeways
    question: |
      Cluster standalone Gatineau-side bike-lane / separated-lane entries
      into a generated gatineau-bikeways network. Stage 1.5. Golden's
      current tier_1 members are the editorial minimum; pipeline adds
      others by proximity.

  # ─── Open editorial questions ───────────────────────────────────────

  - topic: Coulicou Trails — probably not a network
    question: |
      Pipeline emits a "Coulicou Trails" network with 5 MTB trail members
      (Carouge, Coulicou, Faucon, Piranga, Vireo — bird names). No OSM
      relation backing, no markdown, no reference in any project doc.
      Likely the pipeline's network-discovery speculatively grouped these.
      Action: verify via local knowledge or Overpass; most likely outcome
      is demotion to standalone paths. Skip assertions until confirmed.

  - topic: Landsdowne Natural Heritage Park — probably not a network
    question: |
      5 generically-named members ("Connector path", "Lower footpath",
      typo "Uppoer Footpath"). No OSM backing, no markdown. Pipeline
      artefact. Action: demote to standalone paths (or connector/unknown
      if the members are unnamed way fragments). Skip assertions.

  - topic: Monkey Trail — no geometric data
    question: |
      Pipeline entry has no highway/bicycle/surface/anchor data. Earlier
      placement in parc-de-la-gatineau-mtb was an unverified guess.
      Dropped from golden 2026-04-16. Resolve via live Overpass on the
      1 osm_way_id before putting back anywhere.

  - topic: Sentier Trans-Canada Québec decomposition
    question: |
      What regional sub-paths should decomposition produce? Placeholders
      (Parc de la Gatineau / Wakefield / Maniwaki / Mont-Laurier) are
      guesses. What are the split points in km? See 04-long-distance.yaml
      stage_2_pending.

  - topic: Route Verte 1 city bounds
    question: |
      How much of RV1 should remain visible under Ottawa city bounds?
      Extends from Outaouais to Gaspé — most is "not Ottawa". Stage 2
      city-bounds filter handles this.

  - topic: Mill of Kintail / Carp Barrens
    question: |
      Pathways, MTB, or Trails? Edge cases from the earlier review.

  - topic: Trans Canada Trail Ottawa area consolidation
    question: |
      Current bikepaths.yml has trans-canada-trail-ottawa-area as an empty
      umbrella network wrapping Ottawa-Carleton Trailway. Golden proposes
      renaming/consolidating as trans-canada-trail-ontario. Stage 2
      pipeline work determines: is ottawa-carleton-trailway east+west the
      same trail (should merge) or two distinct trails sharing a name?
      Needs live Overpass.

  - topic: trail-1-1 — Gatineau Park MTB trail, needs rename
    question: |
      trail-1-1 is an auto-generated slug collision (Trail #1 already
      exists in NCC Greenbelt). Moved to parc-de-la-gatineau-mtb tier_2
      2026-04-16 based on anchor at lat 45.492 (Gatineau Park area).
      Rename from auto-suffix should happen via Rule 4 (park-naming
      heuristic) once implemented — the way's nearest named road supplies
      the replacement name.

  - topic: Ottawa River Pathway markdown split
    question: |
      ottawa-river-pathway.md may need to be split into two parts (east
      and west) and assigned to each matching pipeline entry. Data-repo
      task. Flag so it's not forgotten.
