name: Test

on:
  workflow_call:
    inputs:
      update-screenshots:
        description: 'Auto-commit updated screenshots on diff'
        type: boolean
        required: false
        default: false
    secrets:
      DATA_REPO_DEPLOY_KEY:
        required: true
      GOOGLE_MAPS_STATIC_API_KEY:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout astro repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Checkout data repo
        uses: actions/checkout@v6
        with:
          repository: eljojo/bike-routes
          ssh-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
          ref: main
          path: bike-routes

      - name: LFS cache period
        id: lfs-period
        run: echo "period=$(( $(date +%s) / 1209600 ))" >> "$GITHUB_OUTPUT"

      - name: Restore app repo LFS cache
        uses: actions/cache@v5
        with:
          path: .git/lfs
          key: lfs-app-${{ steps.lfs-period.outputs.period }}
          restore-keys: lfs-app-

      - name: Pull app repo LFS files
        run: git lfs pull

      - name: Restore data repo LFS cache
        uses: actions/cache@v5
        with:
          path: bike-routes/.git/lfs
          key: lfs-bike-routes-${{ steps.lfs-period.outputs.period }}
          restore-keys: lfs-bike-routes-

      - name: Pull data repo LFS files
        run: git -C bike-routes lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run prebuild (map style, icon paths)
        run: npx tsx scripts/prebuild.ts

      - name: Run unit tests
        run: npx vitest run
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo

      - name: Run Lambda tests
        run: node --test aws/video-agent/handler.test.mjs

      - name: Sync Astro types
        run: npx astro sync
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo

      - name: Type check
        run: npx tsc --noEmit
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo

      - name: Lint
        run: npx eslint src/

      - name: Check migration numbering
        run: |
          dupes=$(ls drizzle/migrations/*.sql | sed 's/.*\///' | cut -d_ -f1 | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::warning::Duplicate migration sequence numbers: $dupes"
          fi

      - name: Check for debug commits
        if: github.event_name == 'pull_request'
        run: |
          debug_commits=$(git log --oneline origin/${{ github.base_ref }}..HEAD | grep -i '^[a-f0-9]* debug:' || true)
          if [ -n "$debug_commits" ]; then
            echo "::warning::PR contains debug commits that should be squashed before merge:"
            echo "$debug_commits"
          fi

      - name: Restore Astro content cache
        uses: actions/cache@v5
        with:
          path: .astro
          key: astro-demo-${{ github.run_id }}
          restore-keys: |
            astro-demo-

      - name: Restore map cache
        uses: actions/cache@v5
        with:
          path: public/maps
          key: maps-demo-${{ hashFiles('bike-routes/demo/routes/**/variants/*.gpx', 'bike-routes/demo/routes/**/*.gpx', 'scripts/generate-maps.ts', 'src/lib/maps/map-paths.ts') }}
          restore-keys: |
            maps-demo-

      - name: Generate map thumbnails
        run: npx tsx scripts/generate-maps.ts
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo
          GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

      - name: Build contributor stats
        run: npx tsx scripts/build-contributors.ts
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo

      - name: Build site (demo)
        run: npx astro build
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo
          DISABLE_ANALYTICS: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Validate build output
        run: npm run validate
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [public, admin, blog, club]
    steps:
      - name: Checkout astro repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
          lfs: true

      - name: Checkout data repo
        uses: actions/checkout@v6
        with:
          repository: eljojo/bike-routes
          ssh-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
          ref: main
          path: bike-routes
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run prebuild (map style, icon paths)
        run: npx tsx scripts/prebuild.ts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-

      - name: Cache Microsoft core fonts
        id: msfonts-cache
        uses: actions/cache@v5
        with:
          path: /usr/share/fonts/truetype/msttcorefonts
          key: msttcorefonts-v1

      - name: Cache Playwright system deps
        id: playwright-deps-cache
        uses: actions/cache@v5
        with:
          path: /tmp/.playwright-deps-installed
          key: playwright-deps-${{ hashFiles('package-lock.json') }}-v1

      - name: Install Microsoft core fonts
        if: ${{ steps.msfonts-cache.outputs.cache-hit != 'true' }}
        run: |
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer

      - name: Install Playwright browsers and deps
        if: ${{ steps.playwright-cache.outputs.cache-hit != 'true' }}
        run: |
          npx playwright install --with-deps chromium
          touch /tmp/.playwright-deps-installed

      - name: Install Playwright system deps
        if: ${{ steps.playwright-cache.outputs.cache-hit == 'true' && steps.playwright-deps-cache.outputs.cache-hit != 'true' }}
        run: |
          npx playwright install-deps chromium
          touch /tmp/.playwright-deps-installed

      - name: Refresh font cache
        run: sudo fc-cache -f

      - name: Restore tile cache
        uses: actions/cache@v5
        with:
          path: e2e/.tile-cache
          key: e2e-tile-cache-v1

      # --- Public E2E only: build site and set up D1 ---
      - name: Generate map thumbnails
        if: matrix.suite == 'public'
        run: npx tsx scripts/generate-maps.ts
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo
          GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

      - name: Build contributor stats
        if: matrix.suite == 'public'
        run: npx tsx scripts/build-contributors.ts
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo

      - name: Build site (demo)
        if: matrix.suite == 'public'
        run: npx astro build
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo
          DISABLE_ANALYTICS: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Add test bindings to generated wrangler config
        if: matrix.suite == 'public'
        run: |
          node -e "
            const fs = require('fs');
            const f = 'dist/server/wrangler.json';
            const c = JSON.parse(fs.readFileSync(f, 'utf8'));
            c.vars = { ...c.vars, R2_ACCOUNT_ID: 'test-account-id' };
            c.d1_databases = [{ binding: 'DB', database_name: 'test', database_id: 'local' }];
            fs.writeFileSync(f, JSON.stringify(c));
          "

      - name: Apply D1 migrations to local test database
        if: matrix.suite == 'public'
        run: |
          for f in drizzle/migrations/*.sql; do
            npx wrangler d1 execute DB --local --config dist/server/wrangler.json --file "$f"
          done

      - name: Run public E2E tests
        if: matrix.suite == 'public'
        run: >-
          npx playwright test --config e2e/playwright.config.ts
          ${{ inputs.update-screenshots && '--update-snapshots' || '' }}
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo

      # --- Admin/blog/club E2E: each builds its own fixture ---
      - name: Run ${{ matrix.suite }} E2E tests
        if: matrix.suite != 'public'
        run: >-
          npx playwright test --config e2e/${{ matrix.suite }}/fixture.ts
          ${{ inputs.update-screenshots && '--update-snapshots' || '' }}
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: demo

      - name: Upload screenshot artifacts
        if: ${{ inputs.update-screenshots && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.suite }}
          path: |
            e2e/snapshots/
            e2e/${{ matrix.suite }}/*-snapshots/
          if-no-files-found: ignore

  update-screenshots:
    if: ${{ inputs.update-screenshots && always() }}
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout astro repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Download all screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: screenshots-*
          merge-multiple: true
          path: e2e/

      - name: Commit updated screenshots
        id: update-screenshots
        run: |
          if git log -1 --format='%s' | grep -q '^ci: update screenshot baselines'; then
            echo "Latest commit is already a screenshot update, skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/snapshots/ e2e/admin/admin-screenshots.spec.ts-snapshots/ e2e/blog/blog-screenshots.spec.ts-snapshots/ e2e/club/club-screenshots.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes"
            exit 0
          fi
          echo "screenshots_updated=true" >> "$GITHUB_OUTPUT"
          git diff --cached --name-only
          git commit -m "ci: update screenshot baselines"
          git push

      - name: Comment on PR with updated screenshots
        if: >-
          steps.update-screenshots.outputs.screenshots_updated == 'true'
          && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- screenshot-update-comment -->';
            const { execSync } = require('child_process');
            const files = execSync('git diff --name-only HEAD~1').toString().trim().split('\n');
            const list = files.map(f => `- \`${f}\``).join('\n');
            const body = `${marker}\n📸 Screenshot baselines were automatically updated:\n\n${list}\n\nCheck the commit diff to review the visual changes.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
