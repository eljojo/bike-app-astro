name: Build and Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        type: string
        required: false
        default: ''
      deploy:
        description: 'Whether to deploy after testing'
        type: boolean
        required: true
      worker-name:
        description: 'Cloudflare Worker name'
        type: string
        required: false
        default: ''
      data-ref:
        description: 'Git ref for bike-routes data repo'
        type: string
        required: false
        default: 'main'
      disable-analytics:
        description: 'Disable Plausible analytics (for staging)'
        type: boolean
        required: false
        default: false
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      DATA_REPO_DEPLOY_KEY:
        required: true
      GOOGLE_MAPS_STATIC_API_KEY:
        required: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || null }}
    steps:
      - name: Checkout astro repo
        uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: eljojo/bike-routes
          ssh-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
          ref: ${{ inputs.data-ref }}
          path: bike-routes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Restore map cache
        uses: actions/cache@v4
        with:
          path: _cache/maps
          key: maps-${{ hashFiles('bike-routes/ottawa/routes/**/variants/*.gpx', 'bike-routes/ottawa/routes/**/*.gpx') }}
          restore-keys: |
            maps-

      - name: Generate map thumbnails
        run: npx tsx scripts/generate-maps.ts
        env:
          CONTENT_DIR: ./bike-routes
          CITY: ottawa
          GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

      - name: Build site
        run: npx astro build
        env:
          CONTENT_DIR: ./bike-routes
          CITY: ottawa
          DISABLE_ANALYTICS: ${{ inputs.disable-analytics && 'true' || '' }}

      - name: Run unit tests
        run: npx vitest run

      - name: Run E2E tests
        run: npx playwright test --config e2e/playwright.config.ts
        env:
          SKIP_SCREENSHOTS: 'true'

      - name: Deploy to Cloudflare Workers
        if: inputs.deploy
        run: npx wrangler deploy --name ${{ inputs.worker-name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
