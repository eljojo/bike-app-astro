name: Build City

on:
  workflow_call:
    inputs:
      city:
        description: 'City to build (matches directory name in data repo)'
        type: string
        required: true
      environment:
        description: 'GitHub deployment environment'
        type: string
        required: false
        default: ''
      wrangler-env:
        description: 'Wrangler environment for deploy'
        type: string
        required: false
        default: ''
      deploy:
        description: 'Whether to deploy after building'
        type: boolean
        required: true
      run-migrations:
        description: 'Whether to run D1 migrations (only needed once per shared DB)'
        type: boolean
        required: false
        default: false
      data-ref:
        description: 'Git ref for bike-routes data repo'
        type: string
        required: false
        default: 'main'
      disable-analytics:
        description: 'Disable Plausible analytics'
        type: boolean
        required: false
        default: false
      cities-to-build:
        description: 'JSON array of cities to build (empty = always build)'
        type: string
        required: false
        default: ''
      app-ref:
        description: 'Git ref for bike-app-astro repo (empty = default branch)'
        type: string
        required: false
        default: ''
      build-trigger:
        description: 'What triggered the build (push, schedule, workflow_dispatch, repository_dispatch)'
        type: string
        required: false
        default: ''
    secrets:
      DATA_REPO_DEPLOY_KEY:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      GOOGLE_MAPS_STATIC_API_KEY:
        required: true

jobs:
  build-deploy:
    if: inputs.cities-to-build == '' || contains(fromJSON(inputs.cities-to-build), inputs.city)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || null }}
    steps:
      - name: Checkout astro repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.app-ref || github.head_ref || github.ref }}

      - name: Checkout data repo
        uses: actions/checkout@v6
        with:
          repository: eljojo/bike-routes
          ssh-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
          ref: ${{ inputs.data-ref }}
          path: bike-routes

      - name: LFS cache period
        id: lfs-period
        run: echo "period=$(( $(date +%s) / 1209600 ))" >> "$GITHUB_OUTPUT"

      - name: Restore app repo LFS cache
        uses: actions/cache@v5
        with:
          path: .git/lfs
          key: lfs-app-${{ steps.lfs-period.outputs.period }}
          restore-keys: lfs-app-

      - name: Pull app repo LFS files
        run: git lfs pull

      - name: Restore data repo LFS cache
        uses: actions/cache@v5
        with:
          path: bike-routes/.git/lfs
          key: lfs-bike-routes-${{ steps.lfs-period.outputs.period }}
          restore-keys: lfs-bike-routes-

      - name: Pull data repo LFS files
        run: git -C bike-routes lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Restore map cache
        uses: actions/cache@v5
        with:
          path: public/maps
          key: maps-${{ inputs.city }}-${{ hashFiles(format('bike-routes/{0}/routes/**/variants/*.gpx', inputs.city), format('bike-routes/{0}/routes/**/*.gpx', inputs.city), format('bike-routes/{0}/rides/**/*.gpx', inputs.city), 'scripts/generate-maps.ts', 'src/loaders/rides.ts', 'src/lib/maps/map-paths.ts') }}
          restore-keys: |
            maps-${{ inputs.city }}-

      - name: Restore bike path geometry cache
        uses: actions/cache@v5
        with:
          path: .cache/bikepath-geometry
          key: bikepath-geo-${{ inputs.city }}-${{ github.run_id }}
          restore-keys: |
            bikepath-geo-${{ inputs.city }}-

      - name: Restore Astro content cache
        uses: actions/cache@v5
        with:
          path: .astro
          key: astro-${{ inputs.city }}-${{ github.run_id }}
          restore-keys: |
            astro-${{ inputs.city }}-

      - name: Restore dist cache
        if: inputs.deploy
        uses: actions/cache@v5
        with:
          path: dist-cache
          key: dist-${{ inputs.city }}-${{ github.run_id }}
          restore-keys: |
            dist-${{ inputs.city }}-

      - name: Record build start time
        if: inputs.deploy
        run: echo "BUILD_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Run prebuild
        run: npx tsx scripts/prebuild.ts
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: ${{ inputs.city }}
          GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Prepare build plan
        run: npx tsx scripts/prepare-build-plan.ts
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: ${{ inputs.city }}
          BUILD_TRIGGER: ${{ inputs.build-trigger }}

      - name: Resolve VIDEO_PREFIX from wrangler config
        id: video-prefix
        run: |
          if [ -n "${{ inputs.wrangler-env }}" ]; then
            PREFIX=$(sed 's|//.*$||' wrangler.jsonc | jq -r '.env["${{ inputs.wrangler-env }}"].vars.VIDEO_PREFIX // empty')
          fi
          echo "value=${PREFIX:-${{ inputs.city }}}" >> "$GITHUB_OUTPUT"

      - name: Build site
        run: npx astro build
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: ${{ inputs.city }}
          VIDEO_PREFIX: ${{ steps.video-prefix.outputs.value }}
          DISABLE_ANALYTICS: ${{ inputs.disable-analytics && 'true' || '' }}
          ENABLE_BIKE_PATHS: ${{ inputs.environment != 'production' }}
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Merge incremental build
        if: inputs.deploy
        run: npx tsx scripts/merge-incremental-build.ts

      - name: Prepare wrangler config for deploy
        if: inputs.deploy
        run: |
          # The Astro Cloudflare adapter generates dist/server/wrangler.json
          # with its own config that lacks our env definitions (D1 bindings,
          # worker names). Remove it so wrangler uses our wrangler.jsonc.
          # Then patch our config with the worker entry point and assets path
          # (can't be present at build time because Vite validates the file exists).
          #
          # Before removing the generated config, diff it against ours to catch
          # any settings the adapter introduced that we're missing. This is how
          # the no_bundle bug was caught — the generated config had it, ours didn't.
          node -e "
            const fs = require('fs');
            const generated = JSON.parse(fs.readFileSync('dist/server/wrangler.json', 'utf8'));
            const ours = JSON.parse(fs.readFileSync('wrangler.jsonc', 'utf8'));

            // Keys the adapter manages or patches below — skip these
            const managed = new Set(['main', 'assets', 'upload_source_maps']);

            // Keys that are adapter metadata, wrangler defaults, or adapter-managed bindings
            const ignore = new Set([
              'configPath', 'userConfigPath', 'topLevelName',
              'definedEnvironments', 'legacy_env',
              // Adapter-managed bindings (SESSION kv, IMAGES)
              'kv_namespaces', 'images',
              // Wrangler defaults that don't affect runtime
              'jsx_factory', 'jsx_fragment', 'dev', 'name', 'vars',
              'triggers', 'python_modules',
            ]);

            function isEmpty(v) {
              if (v == null) return true;
              if (Array.isArray(v) && v.length === 0) return true;
              if (typeof v === 'object') {
                return Object.values(v).every(sub => isEmpty(sub));
              }
              return false;
            }

            // These are the settings that actually affect runtime behaviour
            const critical = ['no_bundle', 'rules', 'compatibility_date',
              'compatibility_flags', 'node_compat'];

            const missing = [];
            for (const [key, value] of Object.entries(generated)) {
              if (managed.has(key) || ignore.has(key)) continue;
              if (isEmpty(value)) continue;
              if (!(key in ours)) {
                missing.push({ key, value, severity: critical.includes(key) ? 'CRITICAL' : 'warning' });
              } else if (critical.includes(key) && JSON.stringify(ours[key]) !== JSON.stringify(value)) {
                missing.push({ key, generated: value, ours: ours[key], severity: 'CRITICAL' });
              }
            }
            const errors = missing.filter(m => m.severity === 'CRITICAL');
            const warnings = missing.filter(m => m.severity === 'warning');
            if (warnings.length > 0) {
              console.log('New settings in generated wrangler.json (non-critical):');
              console.log(JSON.stringify(warnings, null, 2));
            }
            if (errors.length > 0) {
              console.error('CRITICAL: Generated wrangler.json has settings missing or different in wrangler.jsonc:');
              console.error(JSON.stringify(errors, null, 2));
              console.error('Update wrangler.jsonc to include these settings before deploying.');
              process.exit(1);
            }
            console.log('Config diff check passed.');
          "
          rm -f dist/server/wrangler.json
          rm -rf .wrangler/deploy
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('wrangler.jsonc', 'utf8'));
            c.main = './dist/server/entry.mjs';
            c.assets.directory = './dist/client';
            fs.writeFileSync('wrangler.jsonc', JSON.stringify(c, null, 2));
          "

      # Migrations run only in Ottawa deploy — all cities share one DB.
      # Do NOT add run-migrations to other cities thinking it was forgotten.
      - name: Run D1 migrations
        if: inputs.deploy && inputs.run-migrations && inputs.wrangler-env
        run: npx wrangler d1 migrations apply DB --config wrangler.jsonc --env ${{ inputs.wrangler-env }} --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        if: inputs.deploy
        run: npx wrangler deploy --config wrangler.jsonc ${{ inputs.wrangler-env && format('--env {0}', inputs.wrangler-env) || '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Clear content edits cache
        if: inputs.deploy && inputs.wrangler-env
        run: |
          # Check if the city column exists before using it in the query.
          # The migration may not have been applied yet (runs in a parallel job).
          HAS_CITY=$(npx wrangler d1 execute DB --config wrangler.jsonc --env ${{ inputs.wrangler-env }} --remote --command "SELECT COUNT(*) as n FROM pragma_table_info('content_edits') WHERE name = 'city'" --json | jq '.[0].results[0].n')
          if [ "$HAS_CITY" = "1" ]; then
            npx wrangler d1 execute DB --config wrangler.jsonc --env ${{ inputs.wrangler-env }} --remote --command "DELETE FROM content_edits WHERE city = '${{ inputs.city }}' AND updated_at < '${{ env.BUILD_START }}'"
          else
            npx wrangler d1 execute DB --config wrangler.jsonc --env ${{ inputs.wrangler-env }} --remote --command "DELETE FROM content_edits WHERE updated_at < '${{ env.BUILD_START }}'"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
