name: Build City

on:
  workflow_call:
    inputs:
      city:
        description: 'City to build (matches directory name in data repo)'
        type: string
        required: true
      environment:
        description: 'GitHub deployment environment'
        type: string
        required: false
        default: ''
      wrangler-env:
        description: 'Wrangler environment for deploy'
        type: string
        required: false
        default: ''
      deploy:
        description: 'Whether to deploy after building'
        type: boolean
        required: true
      run-migrations:
        description: 'Whether to run D1 migrations (only needed once per shared DB)'
        type: boolean
        required: false
        default: false
      data-ref:
        description: 'Git ref for bike-routes data repo'
        type: string
        required: false
        default: 'main'
      disable-analytics:
        description: 'Disable Plausible analytics'
        type: boolean
        required: false
        default: false
      # When the test job already built this city and uploaded an artifact,
      # skip the build and use the artifact instead.
      use-artifact:
        description: 'Download a pre-built artifact instead of building'
        type: string
        required: false
        default: ''
    secrets:
      DATA_REPO_DEPLOY_KEY:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      GOOGLE_MAPS_STATIC_API_KEY:
        required: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || null }}
    steps:
      - name: Checkout astro repo
        uses: actions/checkout@v6
        with:
          lfs: true
          ref: ${{ github.head_ref || github.ref }}

      # Download pre-built artifact if available (e.g. Ottawa from test job)
      - name: Download pre-built artifact
        if: inputs.use-artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.use-artifact }}
          path: dist

      - name: Checkout data repo
        if: inputs.use-artifact == ''
        uses: actions/checkout@v6
        with:
          repository: eljojo/bike-routes
          ssh-key: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
          ref: ${{ inputs.data-ref }}
          path: bike-routes
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Restore map cache
        if: inputs.use-artifact == ''
        uses: actions/cache@v5
        with:
          path: public/maps
          key: maps-${{ inputs.city }}-${{ hashFiles(format('bike-routes/{0}/routes/**/variants/*.gpx', inputs.city), format('bike-routes/{0}/routes/**/*.gpx', inputs.city)) }}
          restore-keys: |
            maps-${{ inputs.city }}-

      - name: Restore Astro content cache
        if: inputs.use-artifact == ''
        uses: actions/cache@v5
        with:
          path: .astro
          key: astro-${{ inputs.city }}-${{ hashFiles(format('bike-routes/{0}/routes/**', inputs.city)) }}
          restore-keys: |
            astro-${{ inputs.city }}-

      - name: Generate map thumbnails
        if: inputs.use-artifact == ''
        run: npx tsx scripts/generate-maps.ts
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: ${{ inputs.city }}
          GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

      - name: Build contributor stats
        if: inputs.use-artifact == ''
        run: npx tsx scripts/build-contributors.ts
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: ${{ inputs.city }}

      - name: Build site
        if: inputs.use-artifact == ''
        run: npx astro build
        env:
          CONTENT_DIR: ${{ github.workspace }}/bike-routes
          CITY: ${{ inputs.city }}
          DISABLE_ANALYTICS: ${{ inputs.disable-analytics && 'true' || '' }}
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Prepare wrangler config for deploy
        if: inputs.deploy
        run: |
          rm -f dist/server/wrangler.json
          rm -rf .wrangler/deploy
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('wrangler.jsonc', 'utf8'));
            c.main = './dist/server/entry.mjs';
            c.assets.directory = './dist/client';
            fs.writeFileSync('wrangler.jsonc', JSON.stringify(c, null, 2));
          "

      # Migrations run only in Ottawa deploy — all cities share one DB.
      # Do NOT add run-migrations to other cities thinking it was forgotten.
      - name: Run D1 migrations
        if: inputs.deploy && inputs.run-migrations && inputs.wrangler-env
        run: npx wrangler d1 migrations apply DB --config wrangler.jsonc --env ${{ inputs.wrangler-env }} --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        if: inputs.deploy
        run: npx wrangler deploy --config wrangler.jsonc ${{ inputs.wrangler-env && format('--env {0}', inputs.wrangler-env) || '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Clear content edits cache
        if: inputs.deploy && inputs.wrangler-env
        run: npx wrangler d1 execute DB --config wrangler.jsonc --env ${{ inputs.wrangler-env }} --remote --command "DELETE FROM content_edits"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
