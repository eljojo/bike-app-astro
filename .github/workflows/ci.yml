name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - '!docs/**'

  test:
    needs: changes
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/_test.yml
    with:
      update-screenshots: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Deploy Ottawa to staging (fresh build with full credentials)
  deploy-ottawa-staging:
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [changes, test]
    uses: ./.github/workflows/_build-city.yml
    with:
      city: ottawa
      environment: staging
      wrangler-env: staging
      deploy: true
      run-migrations: true
      data-ref: staging
      disable-analytics: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Deploy demo and brevet to production so branch changes can be verified live
  deploy-demo-production:
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [changes, test]
    uses: ./.github/workflows/_build-city.yml
    with:
      city: demo
      environment: production
      wrangler-env: demo-production
      deploy: true
      disable-analytics: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  deploy-brevet-production:
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [changes, test]
    uses: ./.github/workflows/_build-city.yml
    with:
      city: brevet
      environment: production
      wrangler-env: brevet-production
      deploy: true
      disable-analytics: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Dependabot: build only, no deploy
  test-dependabot:
    needs: changes
    if: needs.changes.outputs.app == 'true' && github.actor == 'dependabot[bot]'
    uses: ./.github/workflows/_test.yml
    with:
      update-screenshots: false
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}
