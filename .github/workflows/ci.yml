name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/_test.yml
    with:
      update-screenshots: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Deploy Ottawa to staging using the build from the test job
  deploy-ottawa-staging:
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: test
    uses: ./.github/workflows/_build-city.yml
    with:
      city: ottawa
      environment: staging
      wrangler-env: staging
      deploy: true
      run-migrations: true
      data-ref: staging
      disable-analytics: true
      use-artifact: dist-ottawa
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Build demo city to verify it compiles (no deploy)
  build-demo:
    if: github.actor != 'dependabot[bot]'
    needs: test
    uses: ./.github/workflows/_build-city.yml
    with:
      city: demo
      deploy: false
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Dependabot: build Ottawa only, no deploy
  test-dependabot:
    if: github.actor == 'dependabot[bot]'
    uses: ./.github/workflows/_test.yml
    with:
      update-screenshots: false
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}
