name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - '!docs/**'

  # Always-on guard: fail the PR if package.json / package-lock.json / flake.nix
  # disagree on @playwright/test version. Without this, npm's caret ranges and
  # Dependabot silent-roll can drift past the flake's pinned browsers and break
  # local E2E ("Executable doesn't exist at .../chromium_headless_shell-<rev>/").
  check-playwright-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Enforce playwright version alignment
        run: node scripts/check-playwright-sync.mjs --strict

  # Dependabot-only convenience: when Dependabot bumps @playwright/test, auto-
  # reconcile the drift on the PR. The resulting rerun passes the always-on
  # check above. Human PRs have to fix drift manually.
  #
  # Direction is auto-detected, because the flake can only follow npm forward if
  # playwright-web-flake actually publishes a tag for the bumped version:
  #   - tag exists  -> bump flake.nix to match npm (flake follows the bump)
  #   - tag missing -> pin npm back to the flake version (the bump is reverted,
  #                    since the nix dev shell has no browsers for it anyway)
  sync-playwright-flake:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Check playwright version sync
        id: check
        run: |
          npm_version=$(node -e "const l = require('./package-lock.json'); console.log(l.packages['node_modules/@playwright/test'].version)")
          flake_version=$(grep -oP 'playwright-web-flake/\K[0-9]+\.[0-9]+\.[0-9]+' flake.nix)
          echo "package-lock.json: @playwright/test@$npm_version"
          echo "flake.nix:         playwright-web-flake/$flake_version"
          if [ "$npm_version" != "$flake_version" ]; then
            echo "npm_version=$npm_version" >> "$GITHUB_OUTPUT"
            echo "flake_version=$flake_version" >> "$GITHUB_OUTPUT"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect whether the flake publishes the npm version
        id: detect
        if: steps.check.outputs.needs_update == 'true'
        run: |
          repo=$(grep -oE 'github:[^"]+/playwright-web-flake' flake.nix | sed 's|github:||')
          npm_version="${{ steps.check.outputs.npm_version }}"
          if git ls-remote --tags --exit-code "https://github.com/$repo" "refs/tags/$npm_version" >/dev/null 2>&1; then
            echo "direction=bump-flake" >> "$GITHUB_OUTPUT"
            echo "$repo publishes $npm_version: bumping flake.nix to match npm."
          else
            echo "direction=pin-npm" >> "$GITHUB_OUTPUT"
            echo "::warning::$repo has no tag $npm_version; pinning @playwright/test back to flake version ${{ steps.check.outputs.flake_version }} instead."
          fi

      - name: Install Nix
        if: steps.detect.outputs.direction == 'bump-flake'
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Bump flake.nix to match npm
        if: steps.detect.outputs.direction == 'bump-flake'
        run: |
          sed -i 's|playwright-web-flake/[0-9]\+\.[0-9]\+\.[0-9]\+|playwright-web-flake/${{ steps.check.outputs.npm_version }}|' flake.nix
          nix flake update playwright

      - name: Pin npm back to flake version
        if: steps.detect.outputs.direction == 'pin-npm'
        run: |
          npm pkg set "devDependencies.@playwright/test=${{ steps.check.outputs.flake_version }}"
          npm install --package-lock-only

      - name: Commit changes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.detect.outputs.direction }}" = "bump-flake" ]; then
            git add flake.nix flake.lock
            git commit -m "ci: sync playwright flake to ${{ steps.check.outputs.npm_version }}"
          else
            git add package.json package-lock.json
            git commit -m "ci: pin @playwright/test to ${{ steps.check.outputs.flake_version }} (flake has no ${{ steps.check.outputs.npm_version }})"
          fi
          git push

  test:
    needs: [changes, check-playwright-sync]
    if: needs.changes.outputs.app == 'true'
    uses: ./.github/workflows/_test.yml
    with:
      update-screenshots: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Build Ottawa in parallel with tests (warms dist cache)
  build-ottawa:
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [changes]
    uses: ./.github/workflows/_build-city.yml
    with:
      city: ottawa
      deploy: false
      data-ref: staging
      disable-analytics: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Deploy only after both build and tests pass — uses dist artifact from build-ottawa
  deploy-ottawa-staging:
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [changes, test, build-ottawa]
    uses: ./.github/workflows/_build-city.yml
    with:
      city: ottawa
      environment: staging
      wrangler-env: staging
      deploy: true
      deploy-only: true
      run-migrations: true
      data-ref: staging
      disable-analytics: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Deploy demo and brevet to production so branch changes can be verified live
  # deploy-demo-production:
  #   if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
  #   needs: [changes, test]
  #   uses: ./.github/workflows/_build-city.yml
  #   with:
  #     city: demo
  #     environment: production
  #     wrangler-env: demo-production
  #     deploy: true
  #     disable-analytics: true
  #   secrets:
  #     DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
  #     CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  #     CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  #     GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Santiago and brevet are production-only deploys — handled by production.yml on main push.
  # CI only deploys ottawa-staging for PR preview.
