name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - '!docs/**'

  sync-playwright-flake:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      - name: Check playwright version sync
        id: check
        run: |
          npm_version=$(node -e "const l = require('./package-lock.json'); console.log(l.packages['node_modules/@playwright/test'].version)")
          flake_version=$(grep -oP 'playwright-web-flake/\K[0-9]+\.[0-9]+\.[0-9]+' flake.nix)
          echo "package-lock.json: @playwright/test@$npm_version"
          echo "flake.nix:         playwright-web-flake/$flake_version"
          if [ "$npm_version" != "$flake_version" ]; then
            echo "npm_version=$npm_version" >> "$GITHUB_OUTPUT"
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Nix
        if: steps.check.outputs.needs_update == 'true'
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11

      - name: Update flake.nix and lock
        if: steps.check.outputs.needs_update == 'true'
        run: |
          sed -i 's|playwright-web-flake/[0-9]\+\.[0-9]\+\.[0-9]\+|playwright-web-flake/${{ steps.check.outputs.npm_version }}|' flake.nix
          nix flake update playwright

      - name: Commit changes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          git commit -m "ci: sync playwright flake to ${{ steps.check.outputs.npm_version }}"
          git push

  test:
    needs: changes
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/_test.yml
    with:
      update-screenshots: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Deploy Ottawa to staging (fresh build with full credentials)
  deploy-ottawa-staging:
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [changes, test]
    uses: ./.github/workflows/_build-city.yml
    with:
      city: ottawa
      environment: staging
      wrangler-env: staging
      deploy: true
      run-migrations: true
      data-ref: staging
      disable-analytics: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Deploy demo and brevet to production so branch changes can be verified live
  deploy-demo-production:
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [changes, test]
    uses: ./.github/workflows/_build-city.yml
    with:
      city: demo
      environment: production
      wrangler-env: demo-production
      deploy: true
      disable-analytics: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  deploy-brevet-production:
    if: needs.changes.outputs.app == 'true' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [changes, test]
    uses: ./.github/workflows/_build-city.yml
    with:
      city: brevet
      environment: production
      wrangler-env: brevet-production
      deploy: true
      disable-analytics: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Dependabot: build only, no deploy
  test-dependabot:
    needs: [changes, sync-playwright-flake]
    if: needs.changes.outputs.app == 'true' && github.actor == 'dependabot[bot]'
    uses: ./.github/workflows/_test.yml
    with:
      update-screenshots: false
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}
