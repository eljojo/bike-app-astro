name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [data-updated]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_build-and-deploy.yml
    with:
      environment: production
      deploy: true
      worker-name: bike-ottawa-production
      skip-e2e: true
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}
