name: Deploy Production

on:
  push:
    branches: [main]
  schedule:
    # 6 AM Ottawa time (EDT; shifts to 5 AM EST in winter).
    # Rebuilds the calendar page so upcoming events stay current.
    - cron: '0 10 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [data-updated]

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # Determine which cities need rebuilding
  detect-cities:
    runs-on: ubuntu-latest
    outputs:
      cities: ${{ steps.detect.outputs.cities }}
    steps:
      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Data repo webhook — payload.city is comma-separated (e.g. "santiago,ottawa")
            RAW="${{ github.event.client_payload.city || 'ottawa' }}"
            # Convert comma-separated to JSON array: "a,b" → ["a","b"]
            JSON_CITIES=$(echo "$RAW" | tr ',' '\n' | sed 's/.*/"&"/' | paste -sd ',' - | sed 's/^/[/;s/$/]/')
            echo "cities=${JSON_CITIES}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            # Daily rebuild — keeps calendar, events, and date-sensitive
            # content current without needing to check specific dates.
            echo 'cities=["ottawa"]' >> "$GITHUB_OUTPUT"
          else
            # Code change or manual dispatch — rebuild all cities
            echo 'cities=["ottawa","demo","brevet","santiago"]' >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-cities
    strategy:
      matrix:
        include:
          - city: ottawa
            wrangler-env: production
            # Migrations run only in Ottawa deploy — all cities share one DB.
            # Do NOT add run-migrations to other cities thinking it was forgotten.
            run-migrations: true
          - city: demo
            wrangler-env: demo-production
            run-migrations: false
          - city: brevet
            wrangler-env: brevet-production
            run-migrations: false
          - city: santiago
            wrangler-env: santiago-production
            run-migrations: false
      fail-fast: false
    uses: ./.github/workflows/_build-city.yml
    with:
      city: ${{ matrix.city }}
      environment: production
      wrangler-env: ${{ matrix.wrangler-env }}
      deploy: true
      run-migrations: ${{ matrix.run-migrations }}
      cities-to-build: ${{ needs.detect-cities.outputs.cities }}
      build-trigger: ${{ github.event_name }}
    secrets:
      DATA_REPO_DEPLOY_KEY: ${{ secrets.DATA_REPO_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      GOOGLE_MAPS_STATIC_API_KEY: ${{ secrets.GOOGLE_MAPS_STATIC_API_KEY }}

  # Deploy video agent Lambda — only on code changes, not data-only updates
  deploy-lambda:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run Lambda tests
        run: node --test aws/video-agent/handler.test.mjs

      - name: Package and deploy Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd aws/video-agent
          npm ci --omit=dev
          zip -r function.zip handler.mjs package.json node_modules/
          aws lambda update-function-code \
            --function-name video-agent \
            --zip-file fileb://function.zip \
            --publish
